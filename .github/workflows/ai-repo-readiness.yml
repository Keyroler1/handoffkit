name: AI Repo Readiness

on:
  pull_request:

jobs:
  ai-repo-readiness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          path: .
          out: ai-repo-readiness-artifacts
          comment: "false"
